<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <title>Gestionar Ovi Users</title>
    <meta charset="UTF-8" />
</head>
<body>
<h1>Lista de Ovi Users</h1>
<table>
    <thead>
    <tr>
        <th>Nombre</th>
        <th>Apellidos</th>
        <th>DNI</th>
        <th>Estado</th>
        <td></td>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user: ${users}">
        <td th:text="${user.value[0]}"></td>
        <td th:text="${user.value[1]}"></td>
        <td th:text="${user.key}"></td>
        <td th:text="${user.value[2]}"></td>
        <td><a th:href="@{/Technician/userManagement/{dni}(dni=${user.key})}">Editar</a>
        </td>
    </tr>
    </tbody>
</table>
<br><br>
<a href="/" >Volver</a>
</body>
</html>
