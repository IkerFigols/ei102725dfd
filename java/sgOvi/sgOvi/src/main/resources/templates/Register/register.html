<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <link rel="stylesheet" href="../../style.css">
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<main>
<h1>Nueva persona</h1>
    <form th:action="@{/Register/register}" th:object="${person}" method="post">
        <div>
            <label for="dni">Dni: </label>
            <input id="dni" type="text" th:field="*{dni}">
            <div th:if="${#fields.hasErrors('dni')}" th:errors="*{dni}" style="color: red; font-size: 0.9em; margin-top: 5px;"></div>
        </div>

        <div>
            <label for="name">Nombre: </label>
            <input id="name" type="text" th:field="*{name}">
            <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color: red; font-size: 0.9em; margin-top: 5px;"></div>
        </div>

        <div>
            <label for="surname">Apellidos: </label>
            <input id="surname" type="text" th:field="*{surname}">
            <div th:if="${#fields.hasErrors('surname')}" th:errors="*{surname}" style="color: red; font-size: 0.9em; margin-top: 5px;"></div>
        </div>

        <div>
            <label for="phoneNumber">Número de teléfono: </label>
            <input id="phoneNumber" type="text" th:field="*{phoneNumber}">
            <div th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" style="color: red; font-size: 0.9em; margin-top: 5px;"></div>
        </div>

        <div>
            <label for="email">email: </label>
            <input id="email" type="text" th:field="*{email}">
            <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: red; font-size: 0.9em; margin-top: 5px;"></div>
        </div>

        <div>
            <label for="password">Contraseña: </label>
            <input id="password" type="password" th:field="*{password}">
            <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: red; font-size: 0.9em; margin-top: 5px;"></div>
        </div>

        <div>
            <label for="city">Ciudad: </label>
            <input id="city" type="text" th:field="*{city}">
            <div th:if="${#fields.hasErrors('city')}" th:errors="*{city}" style="color: red; font-size: 0.9em; margin-top: 5px;"></div>
        </div>

        <div>
            <label for="province">Provincia: </label>
            <input id="province" type="text" th:field="*{province}">
            <div th:if="${#fields.hasErrors('province')}" th:errors="*{province}" style="color: red; font-size: 0.9em; margin-top: 5px;"></div>
        </div>

        <div>
            <label>Género:</label>

            <input type="radio" id="masculino" value="Masculino" th:field="*{gender}">
            <label for="masculino">Masculino</label>

            <input type="radio" id="femenino" value="Femenino" th:field="*{gender}">
            <label for="femenino">Femenino</label>

            <input type="radio" id="otros" value="Otros" th:field="*{gender}">
            <label for="otros">Otros</label>

            <div th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}" style="color: red; font-size: 0.9em; margin-top: 5px;"></div>

        </div>


        <div>
            <label>A que te quieres registrar:</label>

            <input type="radio" id="pappati" value="PapPati" th:field="*{preference}">
            <label for="pappati"> Profesional de asistente personal
                <span title="Un Asistente Personal es un profesional que ayuda a personas con discapacidad a llevar una vida independiente."
                      style="cursor: help; color: blue;">(?)</span>
            </label>

            <input type="radio" id="oviuser" value="OviUser" th:field="*{preference}">
            <label for="oviuser">Usuario de la OVI
                <span title="Un usuario OVI es una persona con diversidad funcional que coordina su propia asistencia."
                      style="cursor: help; color: blue;">(?)</span>
            </label>
            <div th:if="${#fields.hasErrors('preference')}" th:errors="*{preference}" style="color: red; font-size: 0.9em; margin-top: 5px;"></div>
        </div>

        <div>
            <input type="checkbox" id="dataProtection" th:field="*{dataProtection}">
            <label for="dataProtection">
                Acepto la <a href="https://www.boe.es/buscar/act.php?id=BOE-A-2018-16673" target="_blank">política de protección de datos (LOPD)</a>
            </label>
            <div th:if="${#fields.hasErrors('dataProtection')}" th:errors="*{dataProtection}" style="color: red; font-size: 0.9em;"></div></div>
        </div>

        <button type="submit">Añadir </button>
    </form>
</main>
</body>
</html>
